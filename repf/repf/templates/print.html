<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bid Plan — Print View</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; color: #1a1a1a; padding: 40px; font-size: 12px; }
    @media print {
      body { padding: 20px; }
      .no-print { display: none !important; }
      @page { margin: 15mm; }
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
    .meta-row { display: flex; gap: 30px; margin-bottom: 20px; padding: 12px 16px; background: #f4f1ea; border-radius: 6px; }
    .meta-item label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #888; display: block; }
    .meta-item span { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th { background: #1e2a4a; color: #fff; padding: 8px 10px; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; text-align: left; }
    td { padding: 7px 10px; border-bottom: 1px solid #e5e5e5; font-size: 11px; }
    tr:nth-child(even) { background: #fafaf7; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 8px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
    .cat-strategy { background: #1e2a4a; } .cat-solution { background: #2d6b4a; }
    .cat-content { background: #6b4a2d; } .cat-reviews { background: #8b6914; }
    .cat-governance { background: #5a3d6b; }
    .milestone { font-style: italic; color: #a88b3d; font-weight: 600; }
    .toolbar { margin-bottom: 20px; display: flex; gap: 10px; }
    .toolbar button {
      padding: 8px 18px; border: 1px solid #ccc; border-radius: 5px; background: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .toolbar button:hover { background: #f0f0f0; }
    .toolbar button.primary { background: #1e2a4a; color: #fff; border-color: #1e2a4a; }
    .footer { margin-top: 20px; font-size: 10px; color: #999; text-align: center; }
  </style>
</head>
<body>
  <div class="toolbar no-print">
    <button class="primary" onclick="window.print()">Print / Save as PDF</button>
    <button onclick="window.close()">Close</button>
  </div>

  <h1 id="printTitle">Bid Timeline Plan</h1>
  <div class="subtitle">Bid Management -- Planning Suite</div>

  <div class="meta-row" id="printMeta"></div>

  <table>
    <thead>
      <tr><th>#</th><th>Phase</th><th>Category</th><th>Start</th><th>End</th><th>Duration</th><th>Owner</th></tr>
    </thead>
    <tbody id="printBody"></tbody>
  </table>

  <div class="footer">Generated by Bid Timeline Planner &middot; <span id="printDate"></span></div>

  <script>
    function catClass(c) {
      if (c.includes('STRATEGY'))  return 'cat-strategy';
      if (c.includes('SOLUTION'))  return 'cat-solution';
      if (c.includes('CONTENT'))   return 'cat-content';
      if (c.includes('REVIEW'))    return 'cat-reviews';
      if (c.includes('GOVERNANCE'))return 'cat-governance';
      return 'cat-strategy';
    }
    function fmt(s) {
      if (!s) return '';
      return new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    }

    // Read plan from opener or localStorage
    let plan = null;
    try { plan = JSON.parse(localStorage.getItem('__bid_print_plan__')); } catch(e) {}

    if (plan) {
      document.getElementById('printTitle').textContent = plan.bidName || 'Bid Timeline Plan';
      document.getElementById('printMeta').innerHTML = `
        <div class="meta-item"><label>RFP Release</label><span>${fmt(plan.rfpRelease)}</span></div>
        <div class="meta-item"><label>Submission</label><span>${fmt(plan.submission)}</span></div>
        <div class="meta-item"><label>Total Window</label><span>${plan.totalWindow || '—'} days</span></div>
        <div class="meta-item"><label>Review Cycle</label><span>${(plan.reviewCycle||'').replace('_',' ')}</span></div>
      `;
      const phases = (plan.phases || []).filter(p => !p.excluded);
      document.getElementById('printBody').innerHTML = phases.map((p,i) => `
        <tr>
          <td>${i+1}</td>
          <td>${p.name}</td>
          <td><span class="badge ${catClass(p.category)}">${p.category}</span></td>
          <td>${fmt(p.startDate)}</td>
          <td>${fmt(p.endDate)}</td>
          <td>${p.duration===0?'<span class="milestone">Milestone</span>':p.label}</td>
          <td>${p.owner}</td>
        </tr>
      `).join('');
    } else {
      document.getElementById('printBody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#999;">No plan data found. Open from the main app.</td></tr>';
    }
    document.getElementById('printDate').textContent = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  </script>
</body>
</html>
